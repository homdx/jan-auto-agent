# Add to your working agents_*.ini (both keys shown with recommended values)

[inner_loop]
# Tests mandate: a code-mode change that writes non-test .py files without
# any test file is rejected (bounded, 2 retries, then fail-open). Default in
# code is false; enable per-config for serious runs / self-hosting.
require_tests_code = true

[coder]
# Pre-existing-pattern grandfathering in the safety scanner: editing a file
# that ALREADY contains a flagged pattern (os.unlink in utils.py, subprocess
# in executor.py, ...) is permitted; INTRODUCING such a pattern into a clean
# or new file is still blocked. Required for self-hosting. Default: true.
allow_preexisting_patterns = true
