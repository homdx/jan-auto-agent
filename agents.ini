# ════════════════════════════════════════════════════════════════════════════
# agents.ini — tuned for 4 096-token context window (Jan local API server)
#
# Token budget breakdown (4096 total):
#   coder      sys≈494  out=800  feedback×2≈300  prefetch≈200  => file≈2000 tok
#   architect  sys≈119  out=512  per_file×3      overhead≈50   => per_file≈1100 tok
#   gate1      sys≈96   out=512  overhead≈50                    => block≈3400 tok (big room)
#   validator  sys≈230  out=200  exec≈100        overhead≈100  => file≈3400 tok
#
# NOTE — Jan uses OpenAI-compatible API (api_format = openai).
#   num_ctx is forwarded to Ollama only. Set the model context window
#   to 4096 in Jan UI (Settings → Model → Context Length).
# ════════════════════════════════════════════════════════════════════════════

# ── active profile ────────────────────────────────────────────────────────────
[api]
active     = local
verify_ssl = true

[api_local]
# ── Ollama ──
# Start server: ollama serve
# Verify model: ollama list
# num_ctx is forwarded directly to Ollama via options{} — no UI config needed.
base_url   = http://localhost:11434
api_key    = ollama
model      = qwen3:8b
#llama3.1:8b
#qwen3:8b
api_format = ollama
num_ctx    = 4096
# num_ctx has no effect with api_format=openai — configure in Jan UI instead.
# Keep the key so switching to ollama format works without editing this file.
# ── Jan  ──
#base_url   = http://localhost:1337/v1
#api_key    = jan
#model      = qwen3:8b
#api_format = openai

[api_remote]
base_url   = https://api.server.com
api_key    = <your-token-here>
model      = qwen2.5-coder:32b
api_format = ollama
num_ctx    = 16384

# ── loop control ──────────────────────────────────────────────────────────────
[loop]
# Each failed attempt appends ~150-token feedback to the next prompt.
# With 4K window, 3 attempts is the safe maximum before feedback crowds out file content.
max_iterations   = 3
timeout_seconds  = 2400

# ── search ────────────────────────────────────────────────────────────────────
[search]
# full_file_max_chars: used by SearchAgent for context-probe symbol lookup.
# 3000 chars ≈ 750 tokens — leaves room in the dep budget.
full_file_max_chars = 3000
max_depth           = 8
max_file_kb         = 200
# AUTO-CR-3: allow larger chapter files (prose) in creative mode.
max_file_kb_creative = 400
skip_dirs           = __pycache__,.venv,node_modules,.git,dist,build,venv,.tox

# ── architect ─────────────────────────────────────────────────────────────────
[architect]
# AUTO-FIX (fable follow-up): disable qwen3-style <think> reasoning for
# this call -- with a bounded max_tokens, truncation mid-<think> leaves
# strip_think() with nothing usable and the call fails closed/empty.
# Set true to re-enable reasoning if your model/setup needs it.
think                = false
# AUTO-BUG-8: seconds to wait between retries on a transient LLM/HTTP error
# (comma-separated). Default matches the previous hardcoded schedule; lower
# this for a local model that's known to come up fast, or add a longer first
# delay if it commonly needs time to load into memory.
retry_delays_sec     = 5,15,30
# AUTO-CR-18: cap creative tasks per cluster (small models emit many
# overlapping 'synchronize' tasks that collapse chapters into copies).
max_tasks_creative   = 1
temperature          = 0.2
# 512 tokens for JSON response with 3-4 candidates.
max_tokens           = 512
# AUTO-CR-11: creative needs a larger cap (one full chapter-writing task,
# Cyrillic text) so the JSON plan does not truncate mid-object.
max_tokens_creative  = 1024
# 1500 chars ≈ 500 tokens per file. With 3 files: 1500 tok total — fits budget.
max_file_chars       = 1500
max_files_per_review = 3
rewrite_max_tokens   = 256
rewrite_temperature  = 0.4
rewrite_system = You are a senior architect reviewing failed implementation attempts. Your job is to propose a genuinely different technical strategy for the same goal. Study what was tried before and what went wrong. Do not suggest the same approach with minor changes — if the previous attempt used direct string manipulation, consider AST parsing. If it used a class, consider a function. If it modified state in place, consider returning a new object. Identify the core assumption that caused the previous approach to fail and start from a different assumption. Return only JSON.

# AUTO-CR-20: plan-validator (check architect plan vs goal facts before Gate-1)
validate_plan_creative = true   ; enable plan validation in creative mode
plan_max_revisions     = 1      ; bounded re-runs; fail-open after cap

# ── gate1 false-positive filter ───────────────────────────────────────────────
[gate1]
temperature      = 0.0
# 512 tokens: active model here is qwen3:8b, a thinking model. It wraps its
# JSON verdict in <think>...</think> by default; 128 tokens let the <think>
# block truncate the reply before any JSON is emitted, so every candidate
# failed closed. think=false below disables that reasoning for this call
# (Gate 1 only needs a tiny deterministic verdict), and 512 is headroom in
# case a model ignores the toggle.
max_tokens       = 512
# Disable qwen3's <think> block for this call (Ollama "think" field) — see
# max_tokens comment above. Set true to re-enable reasoning for this gate.
think            = false
# 25 lines × ~40 chars = ~1000 chars ≈ 330 tokens. Well within budget.
max_context_lines = 25
max_block_chars  = 1200

# ── coder ─────────────────────────────────────────────────────────────────────
[coder]
# AUTO-FIX (fable follow-up): disable qwen3-style <think> reasoning for
# this call -- with a bounded max_tokens, truncation mid-<think> leaves
# strip_think() with nothing usable and the call fails closed/empty.
# Set true to re-enable reasoning if your model/setup needs it.
think                = false
# AUTO-CR-18: reject an edit that makes a chapter >= this similar to another
# chapter (prevents 'make identical' from duplicating whole chapters). 0 disables.
dup_reject_ratio     = 0.92
temperature  = 0.2
# 800 tokens: enough for a complete small-to-medium function.
# For larger files increase max_tokens AND widen num_ctx in Jan UI together.
max_tokens   = 800
# Worst-case prompt (attempt 3 with 2 feedback rounds + prefetched context):
#   sys≈494 + task≈120 + feedback≈300 + prefetch≈200 + out=800 = 1914 tokens reserved
#   remaining = 4096 - 1914 = 2182 tokens ≈ 6546 chars
#   max_file_chars = 2000 gives a comfortable safety margin.
max_file_chars      = 2000
context_probe       = true
# Per-symbol dep budget for the in-generate context probe.
# 400 chars ≈ 130 tokens. 3 symbols × 400 = 1200 chars fits in remaining budget.
max_chars_per_dep   = 400
max_dep_chars       = 1200
#
# AUTO-CR-3: creative-mode budget overrides for llama3.1:8b.
# num_ctx_creative is forwarded to Ollama via options{num_ctx} -- no UI config needed.
# max_tokens_creative must be < (num_ctx_creative - system_tokens - prompt_tokens).
num_ctx_creative    = 8192
# AUTO-CR-9: language of generated chapters. "auto" (default) detects the
# language of the story so far and locks output to it (prevents a small model
# drifting Russian → English). Set to a language name (e.g. "Russian",
# "English") to force one regardless of detection.
creative_language   = auto
max_tokens_creative = 2048

# ── inner_loop / validator ────────────────────────────────────────────────────
[inner_loop]
temperature = 0.1

[validator_agent]
# AUTO-FIX (fable follow-up): disable qwen3-style <think> reasoning for
# this call -- with a bounded max_tokens, truncation mid-<think> leaves
# strip_think() with nothing usable and the call fails closed/empty.
# Set true to re-enable reasoning if your model/setup needs it.
think                = false
temperature = 0.1
# 200 tokens: {"approved": bool, "feedback": "...", "hints": [...]}
max_tokens  = 500
# AUTO-FIX-6: raised from 200 — 200 was sized for the short
# code-mode JSON reply ({"approved": bool, "feedback": "..."}). With
# AUTO-FIX-4 restoring the built-in numbered-list creative critique
# (_GATE2_SYSTEM_CREATIVE, several Russian bullet points — Cyrillic runs
# ~2x the tokens of English for the same text, see header note above), the
# old 200-token cap risked truncating the list mid-critique. Code-mode
# JSON replies stay well under this new cap; this is headroom, not a
# behaviour change for code mode.
# Fewer hints reduce output tokens and keep the response short.
max_hints   = 2
system = You are a code-change validator. Given a task description, execution output, and the generated code, decide whether the implementation is complete and correct. Return ONLY a JSON object -- no text before or after: {"approved": true|false, "feedback": "<one sentence reason>", "hints": ["<actionable hint 1>", ...], "suggested_approach": "<optional one-sentence alternative>", "missing_context": ["<symbol you needed to see but were not shown>", ...]}. Use missing_context ONLY when you cannot verify correctness because a referenced symbol's definition was not provided; otherwise omit it. Each hint MUST point to a specific name, line, or pattern in the code (e.g. "import re is used on line 12 but not present in imports"), never a vague instruction like "make sure the code is correct". Omit the hints array (or use []) when approved=true.
# AUTO-CR-19-1: explicit creative override so this is config-visible and the
# bare "system" key above (code-specific) cannot leak into creative mode.
# AUTO-FIX-4: system_creative override REMOVED — it was a stale one-line
# verdict prompt that silently overrode the built-in _GATE2_SYSTEM_CREATIVE
# (numbered multi-point critique, anti-paste rule; see inner_loop.py CR-29/32).
# _resolve_validator_system() gives an explicit [validator_agent] system_creative
# key priority over the built-in for ANY task_mode, so as long as this key was
# set here, every creative run used the old one-line prompt regardless of what
# improved in inner_loop.py. Leave unset to use the built-in; only set this key
# again for a deliberate, reviewed override.
# AUTO-CR-20: Gate-3 task-level fact compliance (creative mode only)
fact_check_creative = true
max_fact_revisions  = 2      ; was 1 — second chance on fact contradictions (AUTO-CR-25-3)
# AUTO-CR-21: Russian rhythm/rhyme gate (creative mode only)
prosody_check_creative      = true   ; deterministic ритм/рифм gate
max_prosody_revisions       = 2      ; bounded; fail-open after cap
# AUTO-CR-24-1: verify story-bible facts against the source chapter before merge
story_bible_creative            = true   ; AUTO-BUG-1 fix: master switch — was missing, subsystem was inert
story_bible_verify              = true   ; AUTO-CR-24: verify bible facts vs the chapter
story_bible_max_fidelity_rounds = 2   ; was 1 — one more pass to fix distortions (AUTO-CR-25-3)
story_bible_immutable_guard = true   ; AUTO-CR-26: write-once for gender/age
prosody_min_scheme          = ABCB   ; ABCB(loosest)|ABAB|AABB
prosody_syllable_tolerance  = 2
# AUTO-CR-23-3: continuity gate vs story bible + previous chapter (creative mode only)
continuity_check_creative = true   ; checks new chapter against bible + prev chapter
max_continuity_revisions  = 2      ; was 1 — second chance to fix a flip (AUTO-CR-25-3)

# ── ContextBroker ─────────────────────────────────────────────────────────────
[context_broker]
# max_block_chars: hard cap per resolved symbol. 400 chars ≈ 130 tokens — small functions only.
max_block_chars = 400
# max_symbols: at 400 chars each, 3 symbols = 1200 chars ≈ 400 tokens total dep injection.
max_symbols     = 3

# ── auto pipeline ─────────────────────────────────────────────────────────────
[auto]
git_user            = auto-agent
git_email           = auto-agent@localhost
max_runtime_min     = 0
max_tasks_per_run   = 0
exec_timeout_sec    = 120
rewrite_every_n_rounds = 2
max_rewrites        = 3
task_mode           = code
# AUTO-CR-3: when true (default), missing acceptance_check in creative mode defaults to "true".
creative_acceptance_default = true
# Bounded compression/fidelity/canon caps (consumed by AUTO-CR-5 and AUTO-CR-7).
max_compression_passes      = 2
max_fidelity_rounds         = 2
canon_check_every           = 3
max_canon_revisions         = 1
# AUTO-CR-16: creative gets more coder→review→revise cycles than code
# (editing existing chapters + applying review fixes benefits from retries).
max_attempts_per_task          = 5
max_attempts_per_task_creative = 8
# AUTO-CR-7: max factual claims grounded per chapter (bounds canon LLM calls).
canon_max_claims            = 12

# ── other agents (unchanged) ─────────────────────────────────────────────────
[chat]
use_context  = true
new_chat_key = /new
exit_key     = /exit

[main_agent]
temperature       = 0.3
system_delegate   = You are the Chief Architecture Routing Agent. Your task is to look at incoming natural language coding inputs, identify target components, coordinate dependency assembly contexts, and assign downstream validation paths. Maintain clean state arrays.
system_assemble   = You are the Context Assembly Agent. Aggregate structural files, import tokens, and reference blocks into a single complete code bundle. Ensure no duplicate declarations enter the token payload.

[direct_chat]
temperature = 0.3

[search_agent]
temperature = 0.2
system      = You are an engineering-grade reference analyzer. Examine the attached source code snippets and filter out noise such as standard library wrappers (e.g., generic logging calls, standard os/sys wrappers, or boilerplate imports). Retain and approve only local, custom domain logic components crucial for dependency resolution.

[file_editor]
temperature = 0.2
max_tokens  = 512
# prev_context_every = N
#   Show the writer its previous attempt (alongside feedback) for N consecutive
#   retries, then force one "clean" iteration (feedback only) to break loops,
#   then repeat the window.
#   0 = disabled — original behaviour (writer never sees its own previous attempt).
#   2 = show prev for 2 iters → 1 clean iter → repeat  (recommended default)
#   1 = alternating: show prev / clean / show prev / clean …
prev_context_every = 2
# prev_context_max_chars = N
#   Hard cap on the previous-attempt text injected into the prompt.
#   Prevents the doubled file content from blowing the context window.
#   0 = no limit (safe only for small files; not recommended with 4K context).
#   Recommended: match [coder] max_file_chars (2000) or set to ~half num_ctx chars.
prev_context_max_chars = 2000

[improvement_agent]
temperature = 0.4
max_tokens  = 1000
system_improve = You are a senior code reviewer. Analyze the validated code context, identify security vulnerabilities, logical flaws, edge cases, and performance bottlenecks. You MUST return your output following this exact layout strictly:\n\n    EXPLANATION:\n    <what this code does in 2-3 sentences>\n\n    ISSUES:\n    - <issue 1>\n    - <issue 2>\n\n    IMPROVED CODE:\n    <full improved function or class block here>\n\n    CHANGES:\n    - <change 1>\n    - <change 2>
system_explain = You are a code explainer. Break down the provided code block's architectural mechanics, interactions, execution sequence, and API dependencies clearly. Provide structural insights without generating any code changes or diff files.

[output]
stream_agents        = true
show_context_lines   = true
show_timing          = true
show_iteration_count = true

[prompt_store]
max_versions = 3
store_path   = prompts.json

[prompt_optimizer]
enabled                = true
temperature            = 0.4
trigger_avg_iterations = 2.0
trigger_json_fail_rate = 0.30
min_runs_before_optimize = 5

[trace]
enabled              = true
path                 = agent_trace.jsonl
max_field_chars      = 4000
console_echo         = true
console_preview_chars = 300

# ── faq / knowledge-base resolver ─────────────────────────────────────────────
# Drop short .txt or .md files into the knowledge folder — one topic per file.
# Recommended format (plain text is fine too):
#
#   Q: How do I reset my password?
#   A: Go to Settings → Account → Reset password and follow the steps.
#
# Usage:
#   Interactive:  /faq how do I reset my password?
#   One-shot CLI: python main.py --faq "how do I reset my password?"
#   Batch script: python main.py --faq "question" --base /path/to/project
#                 exit 0 = answer found,  exit 1 = NOT FOUND
#
[faq_agent]
# Path to the knowledge folder (relative to cwd, or absolute).
knowledge_dir    = ./knowledge
# File extensions to load from that folder.
extensions       = .txt,.md
# 0.0 keeps answers deterministic — best for exact Q&A lookup.
temperature      = 0.0
# 512 tokens is plenty for a concise help-desk answer.
max_tokens       = 1024
# Exact string returned (and printed) when no file contains the answer.
not_found_marker = NOT FOUND
# System prompt sent to the model for every FAQ request.
system = You are a help-desk FAQ resolver. Answer the user's question using ONLY the content of the knowledge files provided below. The knowledge files and the question may be written in DIFFERENT languages — understand the content by meaning regardless of language, and write your answer in the language of the user's question. Quote or paraphrase the relevant answer text. If NONE of the files contain a suitable answer, reply with exactly: NOT FOUND
#
# ── two-stage smart-search ───────────────────────────────────────────────────
# When smart_search = true the agent runs a fast keyword-extraction LLM call
# (architect pass) to identify relevant files before sending any knowledge
# content.  Only files whose path+content contains at least one keyword
# (frequency-weighted) are tried in Stage 1.  If all Stage-1 candidates
# return NOT FOUND or fail validation, Stage 2 sends ALL files as one block.
smart_search         = true
# System prompt for the keyword-extraction call.
keyword_system       = You are a search keyword extractor. Given a user question, extract 3-8 important search keywords. Return ONLY a JSON array of lowercase strings, for example: ["reset","password","account"]. No explanation, no markdown fences, no other text.
# 64 tokens is plenty for a small JSON array.
keyword_max_tokens   = 64
# Maximum number of top-ranked files to try individually in Stage 1.
# 0 = unlimited (try every file with score > 0).  5 is a safe default for
# the 4 K context window — each single-file call stays well within budget.
max_candidates       = 5
#
# ── answer-validation pass ───────────────────────────────────────────────────
# When validate_answer = true, a second LLM call checks that the candidate
# answer is grounded in the knowledge base before it is returned to the caller.
# Answers that fail validation are treated as NOT FOUND.
# Set to false (default) to preserve the single-pass behaviour.
validate_answer      = true
# 0.0 keeps the verdict deterministic.
validate_temperature = 0.0
# 64 tokens is enough for "VALID" or "INVALID: <brief reason>".
validate_max_tokens  = 64
# Validation system prompt — override here to tune strictness.
validate_system = You are an answer quality validator for a help-desk FAQ system. You are given a user question, the knowledge-base content that was searched, and a candidate answer produced from that content. The question, knowledge, and answer may be in different languages — judge by MEANING, not language; a correct translation of the knowledge is VALID. Reply with exactly VALID if the answer correctly and completely addresses the question using only the provided knowledge. Reply with INVALID: <brief reason> if the answer is wrong, hallucinated, incomplete, or not grounded in the knowledge base. No other output — VALID or INVALID: <reason> only.

# ── grounding / intent revalidation ──────────────────────────────────────────
# Dedicated extra LLM pass: checks the answer is DIRECTLY grounded in the
# knowledge base for the question AS ASKED. If the KB only contains related or
# opposite information (e.g. you ask how to DISABLE X but the KB only documents
# ENABLING X), the answer is returned WITH AN EXPLICIT CAVEAT instead of a
# fabricated/inverted procedure. If the KB has nothing relevant -> NOT FOUND.
# This pass owns question-intent grounding; validate_system above is kept as a
# lenient quality check so it does not pre-empt the caveat path.
revalidate_grounding = true
# Optional: override the revalidation system prompt (single line).
# revalidate_grounding_system = ...

# ── Keys added by the Fable review cycle (all optional) ──────────────────────
# [validator_agent]
# theme_check_creative = false      ; creative-only content gate: chapter must
# theme_guidelines =                ;   respect these story-level guidelines
# max_theme_revisions = 2           ;   (see theme_validator.py; empty = off)
# story_bible_semantic_guard = true ; LLM conflict gate on bible merge — drops
#                                   ;   new facts contradicting established ones
# [story_bible]
# max_tokens = 1000                 ; own budget (no longer borrows validator's)
# think = false                     ; qwen3-style reasoning off for extraction
# [summary_memory]
# think = false                     ; same, for synopsis updates
# [coder]
# ascii_identifiers_only = false    ; code mode: reject non-ASCII identifiers
#                                   ;   in generated .py (PEP 3131 guard);
#                                   ;   strings/comments may be any language
# Coder JSON schema also supports {"path": ..., "delete": true} for refactors
# that remove a file (path must be in target_files; backup to .coder.bak).

# ── collect mode (COLLECT-19/20) ──────────────────────────────────────────────
# Entire section is optional. Absent section = identical to every default
# below, i.e. today's behavior: /collect and --collect still work (producer
# side is always available), but nothing reads a collect artifact into
# auto/doc/bughunt unless use_in_* is explicitly turned on.
[collect]
# enabled: master switch for the producer (/collect, --collect/--check/
# --refresh/--module). false = every collect action except --check is a
# documented no-op; --check still just reports freshness either way.
enabled         = true
# dir: where the structural model is written. Relative paths resolve
# against the project root. collect can never write outside this dir.
dir             = .collect
# use_in_*: opt-in consumer-side wiring (COLLECT-21/23). Each stays false
# until the corresponding EPIC G loader integration lands, so turning
# these on ahead of that is a no-op today, not a broken build.
use_in_auto     = false
use_in_doc      = false
use_in_bughunt  = false
# staleness: what a consumer does when the artifact is older than the
# tracked source tree. warn = use stale data + flag it; refresh = rebuild
# before reading; ignore = treat exactly like "no artifact". Anything
# else falls back to warn.
staleness       = warn
# llm_summaries: whether Pass B (per-module LLM purpose/notes) runs at
# all. false = --no-llm-equivalent: purely structural artifact, no model
# calls, no [collect] think below applies.
llm_summaries   = true
# think: qwen3-style reasoning tag on Pass B's summarizer calls, same
# convention as [story_bible]/[summary_memory] think= above.
think           = false
