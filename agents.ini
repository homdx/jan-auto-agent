# ── active profile: local | remote ──────────────────────────────────────
[api]
active = remote
# Set verify_ssl = false to skip SSL certificate verification.
# Use this when your API server uses a self-signed or corporate-CA certificate
# and you get SSL: CERTIFICATE_VERIFY_FAILED errors.
verify_ssl = false

[api_local]
base_url = http://localhost:1337/v1
api_key = jan
model = qwen3:8b
api_format = openai
# num_ctx not used in openai format

[api_remote]
base_url = https://api.server.com
api_key = <your-token-here>
model = qwen2.5-coder:32b
api_format = ollama
num_ctx = 16384

[loop]
max_iterations = 3
timeout_seconds = 4800

[search]
full_file_max_chars = 12000
max_depth = 12
max_file_kb = 500
skip_dirs = __pycache__,.venv,node_modules,.git,dist,build,venv,.tox

[chat]
use_context = true
new_chat_key = /new
exit_key = /exit

[main_agent]
temperature = 0.3
system_delegate = You are the Chief Architecture Routing Agent. Your task is to look at incoming natural language coding inputs, identify target components, coordinate dependency assembly contexts, and assign downstream validation paths. Maintain clean state arrays.
system_assemble = You are the Context Assembly Agent. Aggregate structural files, import tokens, and reference blocks into a single complete code bundle. Ensure no duplicate declarations enter the token payload.

[direct_chat]
# Temperature for conversational/direct-chat replies (execute_direct_chat).
temperature = 0.3

[search_agent]
temperature = 0.2
system = You are an engineering-grade reference analyzer. Examine the attached source code snippets and filter out noise such as standard library wrappers (e.g., generic logging calls, standard os/sys wrappers, or boilerplate imports). Retain and approve only local, custom domain logic components crucial for dependency resolution.

[validator_agent]
temperature = 0.1
system = You are a code completeness validator. Check: 1) Is the function body complete and not cut off? 2) Are all called names either in imports, related_code, or standard library? 3) Any missing definitions that should be found? Reply exactly: APPROVED if complete. REJECTED: <one-line reason> | MISSING: name1, name2 if incomplete.
# Maximum number of actionable hints the validator returns per rejection (LOOP-1).
# Each hint is a concrete, specific suggestion for the coder to try next attempt.
max_hints = 3

[file_editor]
temperature = 0.2
# max_tokens: cap the editor's token budget so a thinking model cannot spend
# all tokens on <think> reasoning and produce an empty file edit.
# Set to 0 (or omit) for no limit (server default).
max_tokens = 1024

[improvement_agent]
temperature = 0.4
max_tokens = 2000
system_improve = You are a senior code reviewer. Analyze the validated code context, identify security vulnerabilities, logical flaws, edge cases, and performance bottlenecks. You MUST return your output following this exact layout strictly:

    EXPLANATION:
    <what this code does in 2-3 sentences>

    ISSUES:
    - <issue 1>
    - <issue 2>

    IMPROVED CODE:
    <full improved function or class block here>

    CHANGES:
    - <change 1>
    - <change 2>
system_explain = You are a code explainer. Break down the provided code block's architectural mechanics, interactions, execution sequence, and API dependencies clearly. Provide structural insights without generating any code changes or diff files.

[output]
stream_agents = true
show_context_lines = true
show_timing = true
show_iteration_count = true

[prompt_store]
max_versions = 3
store_path = prompts.json

[prompt_optimizer]
enabled = true
temperature = 0.4
trigger_avg_iterations = 2.0
trigger_json_fail_rate = 0.30
min_runs_before_optimize = 5

[trace]
enabled = true
path = agent_trace.jsonl
max_field_chars = 8000
console_echo = true
# how many characters of each prompt/response to print live (0 = header only)
console_preview_chars = 600

[auto]
# Autonomous build mode (opt-in: python main.py --auto "<goal>" --base <dir>)
# Git identity used for the agent's commits (AUTO-A3)
git_user = auto-agent
git_email = auto-agent@localhost
# Domain mode (AUTO-DM-1). Controls which components use code vs. prose
# framing. Uncomment and change to enable docs or creative mode.
# Options: code (default) | docs | creative
# task_mode = code
# Run limits & safety (AUTO-A4). 0 = disabled.
max_runtime_min = 0
max_tasks_per_run = 0
# Per-execution timeout in seconds for running generated code / acceptance
# checks (AUTO-A4 → consumed by the executor, AUTO-C1).
# WARNING: 0 disables the timeout entirely — any acceptance_check script that
# blocks waiting for console input (e.g. an interactive prompt) will hang the
# agent forever with no recovery. Only set to 0 if you are certain every
# acceptance_check exits on its own. Recommended minimum: 60.
exec_timeout_sec = 600
llm_timeout_sec = 600
# ── Architect rewrite policy (LOOP-2) ────────────────────────────────────────
# How many consecutive failed rounds before the architect rewrites the task.
# The rewrite fires when: rnd >= 3 AND (rnd-1) % rewrite_every_n_rounds == 0.
# Default 2 means: rounds 1-3 use impl v1, round 3 triggers rewrite → impl v2,
# rounds 4-5 use impl v2, round 5 triggers rewrite → impl v3, and so on.
# (The rnd >= 3 guard means the first rewrite always requires at least 3 rounds,
# regardless of rewrite_every_n_rounds — 2 is the cadence after the first rewrite.)
rewrite_every_n_rounds = 2
# Hard cap on how many times the architect can rewrite one task across its
# entire lifetime. 0 = disabled (architect rewriting never triggers).
max_rewrites = 5

[architect]
temperature = 0.2
max_tokens = 4096
# Maximum characters of a single file's content included in the review prompt.
# Increase for larger models with bigger context windows; decrease to save tokens.
max_file_chars = 8000
# Maximum number of files reviewed in a single LLM call.
# Larger clusters are automatically split into batches of this size.
max_files_per_review = 4
# ── TaskRewriter config (LOOP-2) ─────────────────────────────────────────────
# Token budget for the rewrite call. Smaller than max_tokens because the output
# is just a new task dict, not a full cluster analysis.
rewrite_max_tokens = 1024
# Higher temperature than normal review — we want creative alternative strategies.
rewrite_temperature = 0.4
# System prompt for TaskRewriter. Override here to tune without touching code.
rewrite_system = You are a senior architect reviewing failed implementation attempts. Your job is to propose a genuinely different technical strategy for the same goal. Study what was tried before and what went wrong. Do not suggest the same approach with minor changes — if the previous attempt used direct string manipulation, consider AST parsing. If it used a class, consider a function. If it modified state in place, consider returning a new object. Identify the core assumption that caused the previous approach to fail and start from a different assumption. Return only JSON.

[coder]
temperature = 0.2
max_tokens = 8192
# Maximum characters of each target file's content sent in the coder prompt.
max_file_chars = 8000

[gate1]
temperature = 0.0
max_tokens = 512
# Maximum lines of source context to include when a line range is cited.
max_context_lines = 60
# Maximum characters of a code block sent to the Gate-1 LLM.
max_block_chars = 8000

[inner_loop]
# Temperature for the autonomous Gate-2 code-change validator (make_inner_loop).
temperature = 0.1

# ── DOMAIN MODE PROFILES (AUTO-DM-6) ────────────────────────────────────────
# Uncomment ONE block below and adjust prompts as needed.
# Leave all commented for default code-improvement mode (task_mode = code).

# ── Documentation mode ───────────────────────────────────────────────────────
# [auto]
# task_mode = docs
#
# [architect]
# system_docs = You are a senior technical writer performing a documentation review. Identify missing sections, outdated commands, unclear explanations, and broken examples. Cite the exact file path and line range where each issue lives. symbol must be null. acceptance_check must be a shell command such as 'grep -q "expected heading" file.md' or 'true' if not checkable. Return only the JSON array of candidates.
#
# [gate1]
# system_docs = You are a documentation reviewer performing a false-positive check. You will be shown a prose excerpt and a description of a claimed documentation problem. Decide whether the problem is genuinely present in the shown text. Return only JSON: {"present": true|false, "reason": "<one sentence>"}.
#
# [validator_agent]
# system = You are a documentation change validator. Given a task description and the revised file content, decide whether the documentation improvement is complete and accurate. Return ONLY a JSON object: {"approved": true|false, "feedback": "<one sentence>", "hints": ["<specific hint>"], "suggested_approach": "<optional>"}. Each hint MUST point to a specific section, heading, or line. Omit hints when approved=true.

# ── Creative mode (poems, stories, essays) ───────────────────────────────────
# [auto]
# task_mode = creative
#
# [architect]
# system_creative = You are a creative writing editor reviewing drafts. Identify weak imagery, inconsistent tone, pacing issues, and unclear structure. cited_location.symbol must be null; cite line range only. acceptance_check should be 'true' or a word-count sanity check such as 'wc -w file.txt | awk "{if (\$1>50) exit 0; else exit 1}"'. Return only the JSON array of candidates.
#
# [validator_agent]
# system = You are a creative writing editor validating a revision. Given a task description and the revised text, decide whether the creative improvement is complete and faithful to the task. Return ONLY a JSON object: {"approved": true|false, "feedback": "<one sentence>", "hints": ["<specific hint>"], "suggested_approach": "<optional>"}.
