[api]
base_url = http://localhost:1337/v1
api_key = jan
model = qwen2.5:14b
#qwen2.5-14b-instruct

[main_agent]
temperature = 0.3
system_delegate = You are an orchestrator agent. Given a user request, formulate a clear focused task for a specialist worker agent. Return only the task description, nothing else.
system_assemble = You are an orchestrator delivering a final answer to the user. Given the user's original request and the validated result from your team, write a clear and helpful final response.

[sub_agent]
temperature = 0.5
system = You are a specialist worker agent. You receive a specific task and execute it thoroughly. Return only the result, no meta-commentary.

[validator_agent]
temperature = 0.2
system = You are a strict quality validator agent. You receive the original task and the worker result. Check for correctness, completeness, and clarity. If the result is good, reply: APPROVED: <result>. If there are issues, reply: CORRECTED: <improved result>. Always start with APPROVED or CORRECTED.

[chat]
# Key to press to start a new chat (clears conversation history)
new_chat_key = /new
# Key to exit
exit_key = /exit
# Whether to keep context between turns (true = remember previous messages)
use_context = true
