[api]
active = local
verify_ssl = true

[api_local]
base_url = http://127.0.0.1:11434
api_key = ollama
model = stub-model
api_format = ollama
num_ctx = 4096

[api_remote]
base_url = https://api.server.com
api_key = <your-token-here>
model = qwen2.5-coder:32b
api_format = ollama
num_ctx = 16384

[loop]
max_iterations = 3
timeout_seconds = 2400

[search]
full_file_max_chars = 3000
max_depth = 8
max_file_kb = 200
max_file_kb_creative = 400
skip_dirs = __pycache__,.venv,node_modules,.git,dist,build,venv,.tox

[architect]
think = false
max_tasks_creative = 1
temperature = 0.2
max_tokens = 512
max_tokens_creative = 1024
max_file_chars = 1500
max_files_per_review = 3
rewrite_max_tokens = 256
rewrite_temperature = 0.4
rewrite_system = You are a senior architect reviewing failed implementation attempts. Your job is to propose a genuinely different technical strategy for the same goal. Study what was tried before and what went wrong. Do not suggest the same approach with minor changes — if the previous attempt used direct string manipulation, consider AST parsing. If it used a class, consider a function. If it modified state in place, consider returning a new object. Identify the core assumption that caused the previous approach to fail and start from a different assumption. Return only JSON.
validate_plan_creative = true   ; enable plan validation in creative mode
plan_max_revisions = 1      ; bounded re-runs; fail-open after cap

[gate1]
temperature = 0.0
max_tokens = 512
think = false
max_context_lines = 25
max_block_chars = 1200

[coder]
think = false
dup_reject_ratio = 0.92
temperature = 0.2
max_tokens = 800
max_file_chars = 2000
context_probe = true
max_chars_per_dep = 400
max_dep_chars = 1200
num_ctx_creative = 8192
creative_language = auto
max_tokens_creative = 2048

[inner_loop]
temperature = 0.1

[validator_agent]
think = false
temperature = 0.1
max_tokens = 500
max_hints = 2
system = You are a code-change validator. Given a task description, execution output, and the generated code, decide whether the implementation is complete and correct. Return ONLY a JSON object -- no text before or after: {"approved": true|false, "feedback": "<one sentence reason>", "hints": ["<actionable hint 1>", ...], "suggested_approach": "<optional one-sentence alternative>", "missing_context": ["<symbol you needed to see but were not shown>", ...]}. Use missing_context ONLY when you cannot verify correctness because a referenced symbol's definition was not provided; otherwise omit it. Each hint MUST point to a specific name, line, or pattern in the code (e.g. "import re is used on line 12 but not present in imports"), never a vague instruction like "make sure the code is correct". Omit the hints array (or use []) when approved=true.
fact_check_creative = true
max_fact_revisions = 2      ; was 1 — second chance on fact contradictions (AUTO-CR-25-3)
prosody_check_creative = true   ; deterministic ритм/рифм gate
max_prosody_revisions = 2      ; bounded; fail-open after cap
story_bible_creative = true   ; AUTO-CR-23: enable the durable-fact story bible
story_bible_max_chars = 2000   ; AUTO-CR-23: bible size cap before compaction
story_bible_verify = true   ; AUTO-CR-24: verify bible facts vs the chapter
story_bible_max_fidelity_rounds = 2   ; was 1 — one more pass to fix distortions (AUTO-CR-25-3)
story_bible_immutable_guard = true   ; AUTO-CR-26: write-once for gender/age
prosody_min_scheme = ABCB   ; ABCB(loosest)|ABAB|AABB
prosody_syllable_tolerance = 2
continuity_check_creative = true   ; checks new chapter against bible + prev chapter
max_continuity_revisions = 2      ; was 1 — second chance to fix a flip (AUTO-CR-25-3)
theme_check_creative = true
theme_guidelines = The story must not glamorize, romanticize, or endorse harmful or self-destructive behaviors (e.g. smoking, alcohol or drug abuse, disordered eating, self-harm, dangerous stunts), and must not present them as effective, cheap, controllable, or admirable solutions to any problem (weight loss, stress, status). Depicting such behavior is allowed when the narrative shows its cost and escalation as loss rather than achievement, discipline, or a life hack. Reject a chapter only for guideline violations, not for style or plot choices.
max_theme_revisions = 2

[context_broker]
max_block_chars = 400
max_symbols = 3

[auto]
git_user = auto-agent
git_email = auto-agent@localhost
max_runtime_min = 0
max_tasks_per_run = 0
exec_timeout_sec = 120
rewrite_every_n_rounds = 2
max_rewrites = 3
task_mode = creative
creative_acceptance_default = true
max_compression_passes = 2
max_fidelity_rounds = 2
canon_check_every = 3
max_canon_revisions = 1
max_attempts_per_task = 5
max_attempts_per_task_creative = 8
max_task_seconds = 1800
canon_max_claims = 12
commit_on_success = false
max_outer_iterations = 6
max_tasks_creative = 1

[chat]
use_context = true
new_chat_key = /new
exit_key = /exit

[main_agent]
temperature = 0.3
system_delegate = You are the Chief Architecture Routing Agent. Your task is to look at incoming natural language coding inputs, identify target components, coordinate dependency assembly contexts, and assign downstream validation paths. Maintain clean state arrays.
system_assemble = You are the Context Assembly Agent. Aggregate structural files, import tokens, and reference blocks into a single complete code bundle. Ensure no duplicate declarations enter the token payload.

[direct_chat]
temperature = 0.3

[search_agent]
temperature = 0.2
system = You are an engineering-grade reference analyzer. Examine the attached source code snippets and filter out noise such as standard library wrappers (e.g., generic logging calls, standard os/sys wrappers, or boilerplate imports). Retain and approve only local, custom domain logic components crucial for dependency resolution.

[file_editor]
temperature = 0.2
max_tokens = 512
prev_context_every = 2
prev_context_max_chars = 2000

[improvement_agent]
temperature = 0.4
max_tokens = 1000
system_improve = You are a senior code reviewer. Analyze the validated code context, identify security vulnerabilities, logical flaws, edge cases, and performance bottlenecks. You MUST return your output following this exact layout strictly:\n\n    EXPLANATION:\n    <what this code does in 2-3 sentences>\n\n    ISSUES:\n    - <issue 1>\n    - <issue 2>\n\n    IMPROVED CODE:\n    <full improved function or class block here>\n\n    CHANGES:\n    - <change 1>\n    - <change 2>
system_explain = You are a code explainer. Break down the provided code block's architectural mechanics, interactions, execution sequence, and API dependencies clearly. Provide structural insights without generating any code changes or diff files.

[output]
stream_agents = true
show_context_lines = true
show_timing = true
show_iteration_count = true

[prompt_store]
max_versions = 3
store_path = prompts.json

[prompt_optimizer]
enabled = true
temperature = 0.4
trigger_avg_iterations = 2.0
trigger_json_fail_rate = 0.30
min_runs_before_optimize = 5

[trace]
enabled = true
path = agent_trace.jsonl
max_field_chars = 4000
console_echo = true
console_preview_chars = 300

[faq_agent]
knowledge_dir = ./knowledge
extensions = .txt,.md
temperature = 0.0
max_tokens = 1024
not_found_marker = NOT FOUND
system = You are a help-desk FAQ resolver. Answer the user's question using ONLY the content of the knowledge files provided below. The knowledge files and the question may be written in DIFFERENT languages — understand the content by meaning regardless of language, and write your answer in the language of the user's question. Quote or paraphrase the relevant answer text. If NONE of the files contain a suitable answer, reply with exactly: NOT FOUND
smart_search = true
keyword_system = You are a search keyword extractor. Given a user question, extract 3-8 important search keywords. Return ONLY a JSON array of lowercase strings, for example: ["reset","password","account"]. No explanation, no markdown fences, no other text.
keyword_max_tokens = 64
max_candidates = 5
validate_answer = true
validate_temperature = 0.0
validate_max_tokens = 64
validate_system = You are an answer quality validator for a help-desk FAQ system. You are given a user question, the knowledge-base content that was searched, and a candidate answer produced from that content. The question, knowledge, and answer may be in different languages — judge by MEANING, not language; a correct translation of the knowledge is VALID. Reply with exactly VALID if the answer correctly and completely addresses the question using only the provided knowledge. Reply with INVALID: <brief reason> if the answer is wrong, hallucinated, incomplete, or not grounded in the knowledge base. No other output — VALID or INVALID: <reason> only.
revalidate_grounding = true

